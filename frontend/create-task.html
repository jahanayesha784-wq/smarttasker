<!DOCTYPE html>
<html>
<head>
  <title>Create Task - SmartTasker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="sidebar">
    <h2>🚀 SmartTasker</h2>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="create-task.html">➕ Create Task</a>
    <a href="#" onclick="logout()">🚪 Logout</a>
  </div>

  <div class="main">
    <h1>✨ Create New Task</h1>
    <p class="subtitle">Add task details, assign users, set priority, and upload files.</p>

    <div class="panel create-panel">
      <input type="text" id="taskTitle" placeholder="Task Title">
      <textarea id="taskDescription" placeholder="Task Description"></textarea>
      <input type="text" id="assignedTo" placeholder="Assigned User ID (optional)">

      <select id="priority">
        <option value="Low">Low Priority</option>
        <option value="Medium" selected>Medium Priority</option>
        <option value="High">High Priority</option>
      </select>

      <input type="file" id="attachment">

      <button onclick="createTask()">🚀 Create Task</button>
      <p id="message"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
