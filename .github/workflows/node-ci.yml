name: SmartTasker CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  backend-test:
    name: Backend (Node.js) Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: npm install

      - name: Check Server Syntax
        run: node -c server.js

      - name: Backend Build Check
        run: echo "Backend setup completed successfully"

  frontend-test:
    name: Frontend (HTML/CSS/JS) Check
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Frontend Files
        run: |
          echo "Checking frontend files..."
          ls frontend
          echo "Frontend structure verified"

  python-test:
    name: Streamlit App Test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Check Streamlit App
        run: |
          python -m py_compile streamlit_app.py

  project-summary:
    name: Project Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, python-test]

    steps:

      - name: Project Status
        run: |
          echo "SmartTasker CI/CD completed successfully"
          echo "Backend verified"
          echo "Frontend verified"
          echo "Streamlit app verified"